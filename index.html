<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的出國購物清單</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>購物清單</h1>

        <form id="todo-form" class="card-input">
            <div class="form-group row">
                <input type="text" id="item-name" placeholder="品名（例：面膜）" required>
                <input type="text" id="buyer" placeholder="委託人" required>
            </div>
            <div class="form-group row">
                <select id="location" required>
                    <option value="" disabled selected>購買地點</option>
                    <option value="超市">超市</option>
                    <option value="藥局">藥局</option>
                    <option value="大創">大創</option>
                    <option value="olive young">olive young</option>
                    <option value="其他">其他</option>
                </select>
                <input type="file" id="item-image" accept="image/*">
            </div>
            <button type="submit" class="btn-submit">加入預購清單</button>
        </form>

        <div class="card-input filter-toolbar">
            <div class="filter-item" style="flex: 1;">
                <label style="font-size: 13px; color: #666; display: block; margin-bottom: 5px;">🔍 關鍵字查詢：</label>
                <input type="text" id="filter-keyword" placeholder="搜尋品名..." style="padding: 11px; font-size: 14px;">
            </div>
            <div class="filter-item" style="flex: 1;">
                <label style="font-size: 13px; color: #666; display: block; margin-bottom: 5px;">🔍 依地點查詢：</label>
                <select id="filter-location">
                    <option value="all">全部地點</option>
                    <option value="超市">超市</option>
                    <option value="藥局">藥局</option>
                    <option value="大創">大創</option>
                    <option value="olive young">olive young</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            <div class="filter-item" style="flex: 1;">
                <label style="font-size: 13px; color: #666; display: block; margin-bottom: 5px;">🔍 依委託人查詢：</label>
                <select id="filter-buyer">
                    <option value="all">全部委託人</option>
                </select>
            </div>
            <div class="filter-item" style="flex: 1;">
                <label style="font-size: 13px; color: #666; display: block; margin-bottom: 5px;">🔍 依購買狀態：</label>
                <select id="filter-status">
                    <option value="all">全部狀態</option>
                    <option value="uncompleted">未購買</option>
                    <option value="completed">已購買完成</option>
                </select>
            </div>
        </div>

        <div id="list-container" class="grid-container">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
